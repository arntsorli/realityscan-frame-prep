name: Windows Build

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/windows.yml"
      - "src/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "tsconfig*.json"
      - "vite.config.ts"
      - "vitest.config.ts"
      - "eslint.config.mjs"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/windows.yml"
      - "src/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "tsconfig*.json"
      - "vite.config.ts"
      - "vitest.config.ts"
      - "eslint.config.mjs"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set build version
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          $version = "0.1.${{ github.run_number }}"
          npm version $version --no-git-tag-version --allow-same-version
          "APP_VERSION=$version" >> $env:GITHUB_ENV

      - name: Set pull request build version
        if: github.event_name != 'push' || github.ref != 'refs/heads/main'
        shell: pwsh
        run: |
          "APP_VERSION=0.1.0" >> $env:GITHUB_ENV

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build portable app
        run: npm run build

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: RealityScan-Frame-Prep-Windows-${{ env.APP_VERSION }}
          path: release/*

      - name: Publish versioned release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $asset = Get-ChildItem -Path release -Filter "*.exe" | Select-Object -First 1
          if (-not $asset) {
            throw "No Windows executable found in release output."
          }

          $tag = "v$env:APP_VERSION"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          $body = @"
          Automated Windows build from main.

          Commit: $env:GITHUB_SHA

          Download the portable `.exe` from the assets below. See the generated notes for changes since the previous release.
          "@

          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag `
              --title "RealityScan Frame Prep $tag" `
              --notes $body `
              --target $env:GITHUB_SHA `
              --generate-notes `
              --latest
          }

          gh release upload $tag $asset.FullName --clobber
