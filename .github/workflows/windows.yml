name: Windows Build

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/windows.yml"
      - "src/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "tsconfig*.json"
      - "vite.config.ts"
      - "vitest.config.ts"
      - "eslint.config.mjs"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/windows.yml"
      - "src/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "tsconfig*.json"
      - "vite.config.ts"
      - "vitest.config.ts"
      - "eslint.config.mjs"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build portable app
        run: npm run build

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: RealityScan-Frame-Prep-Windows
          path: release/*
