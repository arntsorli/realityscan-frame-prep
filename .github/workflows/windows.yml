name: Windows Build

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/windows.yml"
      - "src/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "tsconfig*.json"
      - "vite.config.ts"
      - "vitest.config.ts"
      - "eslint.config.mjs"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/windows.yml"
      - "src/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "tsconfig*.json"
      - "vite.config.ts"
      - "vitest.config.ts"
      - "eslint.config.mjs"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build portable app
        run: npm run build

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: RealityScan-Frame-Prep-Windows
          path: release/*

      - name: Publish latest download
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $asset = Get-ChildItem -Path release -Filter "*.exe" | Select-Object -First 1
          if (-not $asset) {
            throw "No Windows executable found in release output."
          }

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f latest
          git push --force origin latest

          $body = @"
          Latest successful Windows build from main.

          Commit: $env:GITHUB_SHA

          Download the portable `.exe` from the assets below.
          "@

          gh release view latest *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create latest `
              --title "Latest Windows build" `
              --notes $body `
              --target $env:GITHUB_SHA `
              --latest
          } else {
            gh release edit latest `
              --title "Latest Windows build" `
              --notes $body `
              --target $env:GITHUB_SHA `
              --latest
          }

          gh release upload latest $asset.FullName --clobber
